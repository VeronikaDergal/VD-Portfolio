const { useState, useEffect, useRef } = React;

function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;

    // If the element is already in (or above) the viewport on mount,
    // never hide it — just mark visible immediately, no animation needed.
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 20) {
      el.classList.add('visible');
      return;
    }

    // Element is below the fold — hide it and animate it in on scroll.
    el.classList.add('reveal-pending');

    const show = () => {
      el.classList.remove('reveal-pending');
      el.classList.add('visible');
      obs.disconnect();
      clearTimeout(fb);
    };
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) show(); },
      { rootMargin: '0px 0px -20px 0px', threshold: 0 }
    );
    const fb = setTimeout(show, 800); // safety net
    obs.observe(el);
    return () => { obs.disconnect(); clearTimeout(fb); };
  }, []);
  return ref;
}

/* ─── Modal — centered panel with clickable side backdrop ─── */
function Modal({ open, onClose, title, children }) {
  useEffect(() => {
    if (!open) return;
    document.body.style.overflow = 'hidden';
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => { document.body.style.overflow = ''; window.removeEventListener('keydown', onKey); };
  }, [open, onClose]);

  if (!open) return null;

  const modal = (
    /* full-screen wrapper — clicking the backdrop (this element) closes */
    <div
      onClick={onClose}
      style={{
        position:'fixed', top:0, left:0, right:0, bottom:0,
        zIndex:9999,
        display:'flex', alignItems:'flex-start', justifyContent:'center',
        background:'rgba(253,252,250,0.88)',
        backdropFilter:'blur(6px)',
        WebkitBackdropFilter:'blur(6px)',
        color:'#292524',
        animation:'fadeIn 0.2s ease both',
        overflowY:'auto',
        padding:'40px 0 80px',
      }}
    >
      {/* hint text on the sides */}
      <div style={{
        position:'fixed', left:0, top:'50%', transform:'translateY(-50%)',
        width:'12%', display:'flex', flexDirection:'column', alignItems:'center',
        opacity:0.3, pointerEvents:'none', userSelect:'none',
      }}>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:'#292524',writingMode:'vertical-rl',transform:'rotate(180deg)'}}>click to close</span>
      </div>
      <div style={{
        position:'fixed', right:0, top:'50%', transform:'translateY(-50%)',
        width:'12%', display:'flex', flexDirection:'column', alignItems:'center',
        opacity:0.3, pointerEvents:'none', userSelect:'none',
      }}>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:'#292524',writingMode:'vertical-rl'}}>click to close</span>
      </div>

      {/* the actual panel — stop clicks from bubbling to backdrop */}
      <div
        onClick={e => e.stopPropagation()}
        style={{
          width:'min(780px, 76vw)',
          flexShrink:0,
          background:'#fdf8f1',
          borderRadius:'2rem',
          border:'1px solid rgba(3,105,161,0.1)',
          boxShadow:'0 24px 80px -16px rgba(0,0,0,0.16), 0 4px 16px rgba(0,0,0,0.06)',
          overflow:'hidden',
          animation:'slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both',
        }}
      >
        {/* sticky header */}
        <div style={{
          position:'sticky', top:0,
          background:'rgba(253,248,241,0.97)',
          backdropFilter:'blur(20px)',
          WebkitBackdropFilter:'blur(20px)',
          borderBottom:'1px solid rgba(3,105,161,0.08)',
          padding:'12px 24px',
          display:'flex', alignItems:'center', justifyContent:'space-between',
          zIndex:2,
        }}>
          <span style={{fontSize:10,fontWeight:800,letterSpacing:'0.2em',textTransform:'uppercase',color:'#57534e',opacity:0.5}}>
            {title || 'Case Study'}
          </span>
          <button
            onClick={onClose}
            aria-label="Close"
            style={{
              width:36, height:36, borderRadius:'50%', border:'none', cursor:'pointer',
              background:'rgba(3,105,161,0.08)', color:'#0369a1',
              display:'flex', alignItems:'center', justifyContent:'center',
            }}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        {/* content */}
        <div style={{padding:'36px 40px 60px'}}>
          {children}
        </div>
      </div>
    </div>
  );

  return ReactDOM.createPortal(modal, document.body);
}
